name: Build zetra APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # This adds a manual "Run" button so you don't have to wait

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Netscape APK
        # We skip lint and tests to ensure it builds in minutes, not hours
        run: ./gradlew assembleDebug -x lint -x test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-messenger-apk
          path: app/build/outputs/apk/debug/*.apk
