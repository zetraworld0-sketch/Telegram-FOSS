name: Build Netscape APK

on:
  push:
    branches:
      - master # Note: Telegram-FOSS uses 'master' instead of 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Telegram APK
        # Telegram-FOSS uses 'assembleRelease' or 'assembleDebug'
        # We skip lint and tests to ensure a fast build
        run: ./gradlew assembleDebug -x lint -x test --no-daemon

      - name: Upload Netscape APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-messenger-apk
          # Telegram's APK path is slightly different than standard apps
          path: TMessagesProj/build/outputs/apk/debug/*.apk
