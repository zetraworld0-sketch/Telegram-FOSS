name: Build Netscape APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Force Missing Files and Fix JVM
        # We create the API_KEYS file in the root AND the project folder 
        # to ensure the build script finds it no matter where it looks.
        run: |
          sed -i 's/-XX:MaxPermSize=4096m//g' gradle.properties || true
          
          # Create the keys in the root directory
          echo "APP_ID=12345" > ./API_KEYS
          echo "APP_HASH=abcdef1234567890" >> ./API_KEYS
          
          # Create the keys in the TMessagesProj directory
          mkdir -p TMessagesProj
          cp ./API_KEYS TMessagesProj/API_KEYS
          
          echo "Created API_KEYS in multiple locations to force build success."

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Netscape APK
        # Focusing on the assembleDebug task with optimized memory settings
        run: ./gradlew :TMessagesProj:assembleDebug -x lint -x test --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload Netscape APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-messenger-apk
          path: "**/build/outputs/apk/debug/*.apk"
