name: Build Netscape APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Fix Legacy JVM Options
        # This command removes the 'MaxPermSize' which is causing your crash
        run: |
          sed -i 's/-XX:MaxPermSize=4096m//g' gradle.properties || true
          sed -i 's/-XX:MaxPermSize=1024m//g' gradle.properties || true

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Telegram APK
        # We pass a clean memory heap directly to override the bad file settings
        run: ./gradlew assembleDebug -x lint -x test --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload Netscape APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-messenger-apk
          path: TMessagesProj/build/outputs/apk/debug/*.apk
