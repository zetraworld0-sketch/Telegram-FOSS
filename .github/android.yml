name: Build Netscape APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        # Note: Most modern Chat repos use Java 17 for stability
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Professional APK
        # We still skip lint/tests to keep the build time under 10 minutes
        run: ./gradlew assembleDebug -x lint -x test --no-daemon

      - name: Upload Netscape Build
        uses: actions/upload-artifact@v4
        with:
          name: netscape-chat-apk
          path: app/build/outputs/apk/debug/*.apk
